<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SacSmart</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- En-tête -->
  <header class="app-header">
    <img src="assets/logo.png" alt="Logo SacSmart" class="logo">
    <h1>SacSmart</h1>
  </header>

  <!-- Page d'accueil -->
  <main class="home">
    <h2 class="welcome">Bienvenue, élève 👋</h2>

    <div class="streak">
      🔥 Série : <span id="streak-count">3 jours</span>
    </div>

    <button class="main-btn" id="prepare-btn">🎒 Préparer mon sac</button>

    <div class="card next-class">
      <h3>Prochain cours</h3>
      <p><strong>Mathématiques</strong> à 14h00 - Salle 203</p>
    </div>

    <div class="card summary">
      <h3>Résumé du sac</h3>
      <ul>
        <li>Cahier de maths</li>
        <li>Calculatrice</li>
        <li>Bouteille d’eau</li>
      </ul>
    </div>
  </main>

  <!-- Barre de navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn active">🏠 Accueil</button>
    <button class="nav-btn">📅 Emploi du temps</button>
    <button class="nav-btn">🎒 Mon sac</button>
    <button class="nav-btn">⚙️ Paramètres</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
