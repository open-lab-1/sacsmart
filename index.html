<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SacSmart</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <img src="assets/logo.png" alt="Logo SacSmart" class="logo">
    <h1>SacSmart</h1>
  </header>

  <main class="content">
    <section class="card">
      <h2>Bienvenue 👋</h2>
      <p>Prépare ton sac automatiquement selon ton emploi du temps.</p>
    </section>

    <section class="card">
      <h2>Fonctionnalités à venir</h2>
      <ul>
        <li>Analyse de ton emploi du temps</li>
        <li>Suggestions d’objets à emporter</li>
        <li>Notifications intelligentes</li>
      </ul>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active">Accueil</button>
    <button class="nav-btn">Sac</button>
    <button class="nav-btn">Profil</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
